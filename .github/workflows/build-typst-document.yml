name: Build Typst Document

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Fontist
        uses: fontist/setup-fontist@v2

      - name: Install fonts from manifest
        run: fontist install "Fira Code" "IBM Plex Mono" "IBM Plex Serif" "Times New Roman" "SimHei" "Noto Serif CJK SC" "Noto Sans CJK SC" "TeX Gyre Termes Math" "TeXGyreTermes" --newest -a -h

      - name: Install Source Han Serif SC
        run: |
          curl -L -o SourceHanSerifSC.zip https://github.com/adobe-fonts/source-han-serif/releases/download/2.003R/09_SourceHanSerifSC.zip
          unzip -o SourceHanSerifSC.zip -d ~/.fontist/fonts

      - name: Convert Markdown to Typst and append to main.typ
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          for dir in $(ls experiment/1 | grep -E '^[0-9]+$' | sort -n); do
            if [ -f "experiment/1/$dir/$dir.md" ]; then
              pandoc "experiment/1/$dir/$dir.md" -o "experiment/1/$dir/$dir.typ"
              echo "" >> "experiment/1/main.typ"
              cat "experiment/1/$dir/$dir.typ" >> "experiment/1/main.typ"
            fi
          done
          if [ -f "experiment/1/answer/answer.md" ]; then
            pandoc "experiment/1/answer/answer.md" -o "experiment/1/answer/answer.typ"
            echo "" >> "experiment/1/main.typ"
            cat "experiment/1/answer/answer.typ" >> "experiment/1/main.typ"
          fi

      - name: Create output directory
        run: mkdir -p output

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Compile Typst document
        run: |
          typst compile experiment/1/main.typ output/experiment-1.pdf --font-path ~/.fontist/fonts
          typst compile homework/main.typ output/homework.pdf --font-path ~/.fontist/fonts

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H-%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: Release ${{ steps.date.outputs.date }}
          body: |
            ## Build Information

            This document was automatically compiled and released by GitHub Actions on `${{ steps.date.outputs.date }}`.

            - **Commit Hash**: `${{ github.sha }}`
            - **Commit Message**: ${{ github.event.head_commit.message }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
