<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>实验文档索引</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <style>
        body {
            background: #f6f8fa;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif;
            color: #22272e;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 32px 24px 24px 24px;
        }
        h1 {
            text-align: center;
            margin-bottom: 32px;
            color: #1a1a1a;
        }
        .exp-list {
            margin-bottom: 24px;
        }
        .exp-folder {
            margin-bottom: 12px;
        }
        .exp-folder > summary {
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            color: #1a1a1a;
        }
        .answer-toggle {
            margin: 8px 0;
            display: inline-block;
            cursor: pointer;
            color: #fff;
            background: #0969da;
            border: none;
            border-radius: 4px;
            padding: 2px 10px;
            font-size: 0.95em;
            transition: background 0.2s;
        }
        .answer-toggle:hover {
            background: #1756a9;
        }
        .markdown-body {
            background: none;
            padding: 0;
            color: #22272e;
        }
        details[open] > summary:before {
            content: "▼ ";
        }
        details > summary:before {
            content: "▶ ";
        }
        a { color: #0969da; }
        code, pre { color: #1a1a1a; }
    </style>
</head>
<body>
<div class="container">
    <h1>实验文档索引</h1>
    <div id="exp-list" class="exp-list"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
// 动态加载目录结构和md内容
const expRoot = 'experiment';
const expListDiv = document.getElementById('exp-list');

async function fetchText(url) {
    try {
        const resp = await fetch(url);
        if (!resp.ok) return null;
        return await resp.text();
    } catch { return null; }
}

function createDetails(title, children) {
    const details = document.createElement('details');
    const summary = document.createElement('summary');
    summary.textContent = title;
    details.appendChild(summary);
    if (children && children.length) {
        children.forEach(child => details.appendChild(child));
    }
    return details;
}

function createMarkdownSection(md, isAnswer) {
    const section = document.createElement('div');
    section.className = 'markdown-body';
    section.innerHTML = marked.parse(md || '');
    // 代码高亮
    section.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
    });
    if (isAnswer) {
        const wrapper = document.createElement('div');
        const btn = document.createElement('button');
        btn.className = 'answer-toggle';
        btn.textContent = '显示/隐藏答案';
        let shown = false;
        const answerDiv = document.createElement('div');
        answerDiv.style.display = 'none';
        answerDiv.appendChild(section);
        btn.onclick = () => {
            shown = !shown;
            answerDiv.style.display = shown ? '' : 'none';
        };
        wrapper.appendChild(btn);
        wrapper.appendChild(answerDiv);
        return wrapper;
    }
    return section;
}

async function buildStaticTree() {
    // 静态写死目录结构（如需动态请用Node脚本预生成）
    // 1/1/1.md, 1/2/2.md, ... 1/8/8.md, 1/answer/answer.md
    const exp1 = createDetails('实验1', [
        createDetails('1', [await createMdNode('1/1/1.md')]),
        createDetails('2', [await createMdNode('1/2/2.md')]),
        createDetails('3', [await createMdNode('1/3/3.md')]),
        createDetails('4', [await createMdNode('1/4/4.md')]),
        createDetails('5', [await createMdNode('1/5/5.md')]),
        createDetails('6', [await createMdNode('1/6/6.md')]),
        createDetails('7', [await createMdNode('1/7/7.md')]),
        createDetails('8', [await createMdNode('1/8/8.md')]),
        createDetails('答案', [await createMdNode('1/answer/answer.md', true)])
    ]);
    expListDiv.appendChild(exp1);
}

async function createMdNode(path, isAnswer = false) {
    const url = `${expRoot}/${path}`;
    const md = await fetchText(url);
    return createMarkdownSection(md, isAnswer);
}

// 入口
buildStaticTree();
</script>
</body>
</html>
