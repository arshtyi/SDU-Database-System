<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>数据库系统实验索引</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px #0001; padding: 32px; }
        h1 { text-align: center; color: #2c3e50; }
        .lab-list { margin: 32px 0; }
        .lab { margin-bottom: 32px; border-left: 4px solid #3498db; padding-left: 16px; background: #f4f8fb; border-radius: 6px; }
        .lab h2 { color: #2980b9; margin-top: 0; }
        .md-content { background: #f9f9f9; border-radius: 6px; padding: 16px; margin: 12px 0; font-size: 15px; overflow-x: auto; }
        pre { background: #272822; color: #f8f8f2; border-radius: 4px; padding: 10px; overflow-x: auto; }
        code { font-family: 'Fira Mono', 'Consolas', monospace; }
        .toc { margin-bottom: 32px; background: #eaf6ff; border-radius: 6px; padding: 16px; }
        .toc ul { padding-left: 20px; }
        .toc a { color: #2980b9; text-decoration: none; }
        .toc a:hover { text-decoration: underline; }
        @media (max-width: 600px) { .container { padding: 8px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>数据库系统实验索引</h1>
        <div class="toc" id="toc">
            <strong>目录</strong>
            <ul>
                <li><a href="#lab1">Lab 1</a></li>
                <li><a href="#lab2">Lab 2</a></li>
                <li><a href="#lab3">Lab 3</a></li>
                <li><a href="#lab4">Lab 4</a></li>
                <li><a href="#lab5">Lab 5</a></li>
                <li><a href="#lab6">Lab 6</a></li>
                <li><a href="#lab7">Lab 7</a></li>
                <li><a href="#lab8">Lab 8</a></li>
                <li><a href="#answer">Answer</a></li>
            </ul>
        </div>
        <div class="lab-list">
            <div class="lab" id="lab1">
                <h2>Lab 1</h2>
                <div class="md-content" id="md-lab1"></div>
            </div>
            <div class="lab" id="lab2">
                <h2>Lab 2</h2>
                <div class="md-content" id="md-lab2"></div>
            </div>
            <div class="lab" id="lab3">
                <h2>Lab 3</h2>
                <div class="md-content" id="md-lab3"></div>
            </div>
            <div class="lab" id="lab4">
                <h2>Lab 4</h2>
                <div class="md-content" id="md-lab4"></div>
            </div>
            <div class="lab" id="lab5">
                <h2>Lab 5</h2>
                <div class="md-content" id="md-lab5"></div>
            </div>
            <div class="lab" id="lab6">
                <h2>Lab 6</h2>
                <div class="md-content" id="md-lab6"></div>
            </div>
            <div class="lab" id="lab7">
                <h2>Lab 7</h2>
                <div class="md-content" id="md-lab7"></div>
            </div>
            <div class="lab" id="lab8">
                <h2>Lab 8</h2>
                <div class="md-content" id="md-lab8"></div>
            </div>
            <div class="lab" id="answer">
                <h2>Answer</h2>
                <div class="md-content" id="md-answer"></div>
            </div>
        </div>
    </div>
    <script>
        // 定义各实验的 md 文件路径
        const mdFiles = {
            lab1: 'experiment/1/1/1.md',
            lab2: 'experiment/1/2/2.md',
            lab3: 'experiment/1/3/3.md',
            lab4: 'experiment/1/4/4.md',
            lab5: 'experiment/1/5/5.md',
            lab6: 'experiment/1/6/6.md',
            lab7: 'experiment/1/7/7.md',
            lab8: 'experiment/1/8/8.md',
            answer: 'experiment/1/answer/answer.md',
        };
        for (const [key, path] of Object.entries(mdFiles)) {
            fetch(path).then(r => {
                if (!r.ok) throw new Error('Not found');
                return r.text();
            }).then(md => {
                document.getElementById('md-' + key).innerHTML = marked.parse(md);
            }).catch(() => {
                document.getElementById('md-' + key).innerHTML = '<em>未找到 ' + path + '</em>';
            });
        }
    </script>
</body>
</html>
